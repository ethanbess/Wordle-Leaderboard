<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>National Wordle League</title>
<style>
  :root {
    --bg-top: #ffd93d;
    --bg-bottom: #d7263d;
    --card: #ffffff;
    --ink: #241a4a;
    --muted: #7a71a3;
    --gold: #ffd257;
    --silver: #d7dbe6;
    --bronze: #e3a26b;
    --accent: #4bd18f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom) 70%);
    min-height: 100vh;
    color: var(--ink);
    padding: 28px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 22px; }
  h1 {
    color: #fff;
    font-size: 30px;
    margin: 6px 0 4px;
    letter-spacing: 0.2px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
  }
  header p {
    color: #fff;
    opacity: 0.92;
    margin: 0;
    font-size: 14px;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
  }
  .board {
    background: var(--card);
    border-radius: 20px;
    padding: 8px;
    box-shadow: 0 20px 40px rgba(20, 10, 60, 0.35);
  }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-radius: 14px;
  }
  .row + .row { margin-top: 2px; }
  .row:nth-child(odd) { background: #f7f5ff; }
  .rank {
    font-weight: 800;
    font-size: 18px;
    width: 34px;
    text-align: center;
    color: var(--muted);
    flex-shrink: 0;
  }
  .row.top1 .rank, .row.top2 .rank, .row.top3 .rank { font-size: 26px; }
  .name {
    flex: 1;
    min-width: 0;
  }
  .name .pname {
    font-weight: 700;
    font-size: 17px;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .name .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .streak-flame {
    opacity: 0.9;
  }
  .score {
    text-align: right;
    flex-shrink: 0;
  }
  .score .val {
    font-weight: 800;
    font-size: 19px;
  }
  .score .lbl {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .row.top1 { background: linear-gradient(90deg, #fff6da, #fff); }
  .row.top2 { background: linear-gradient(90deg, #f1f2f7, #fff); }
  .row.top3 { background: linear-gradient(90deg, #fbe9dc, #fff); }
  footer {
    text-align: center;
    color: #fff;
    opacity: 0.85;
    font-size: 12px;
    margin-top: 20px;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .legend {
    text-align: center;
    color: #fff;
    opacity: 0.9;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
    font-size: 12.5px;
    margin-top: 14px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>National Wordle League</h1>
      <p id="updated">Loading standings…</p>
    </header>

    <div class="board" id="board"></div>

    <p class="legend">Score = 21-day avg guesses, minus a bonus for your play streak.<br>Lower score wins. Miss a day and your streak bonus resets.</p>
    <footer>Updated once a day · built with 💚 for the group</footer>
  </div>

<script>
async function load() {
  const boardEl = document.getElementById("board");
  const updatedEl = document.getElementById("updated");
  try {
    const res = await fetch("leaderboard.json", { cache: "no-store" });
    const data = await res.json();

    if (data.generated_at) {
      const d = new Date(data.generated_at + "T00:00:00");
      updatedEl.textContent = "Standings as of " + d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    if (!data.players || data.players.length === 0) {
      boardEl.innerHTML = '<div class="empty">No one\'s played in the last 21 days. Get in there! 🫠</div>';
      return;
    }

    const medals = ["🥇", "🥈", "🥉"];
    boardEl.innerHTML = data.players.map((p, i) => {
      const rankLabel = i < 3 ? medals[i] : (p.rank + ordinalSuffix(p.rank));
      const topClass = i < 3 ? "top" + (i + 1) : "";
      const streakText = p.streak > 0
        ? `<span class="streak-flame">🔥</span> ${p.streak}-day streak`
        : "no active streak";
      return `
        <div class="row ${topClass}">
          <div class="rank">${rankLabel}</div>
          <div class="name">
            <span class="pname">${escapeHtml(p.player)}</span>
            <span class="sub">${streakText} · ${p.avg.toFixed(2)} avg guesses</span>
          </div>
          <div class="score">
            <div class="val">${p.score.toFixed(2)}</div>
            <div class="lbl">score</div>
          </div>
        </div>`;
    }).join("");
  } catch (e) {
    updatedEl.textContent = "Couldn't load standings 😬";
    console.error(e);
  }
}

function ordinalSuffix(n) {
  const j = n % 10, k = n % 100;
  if (j === 1 && k !== 11) return "st";
  if (j === 2 && k !== 12) return "nd";
  if (j === 3 && k !== 13) return "rd";
  return "th";
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

load();
</script>
</body>
</html>
